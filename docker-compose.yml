# =============================================================
# docker-compose.yml — virgo-recsys Development Environment
# Services: FastAPI saja
#
# CATATAN ARSITEKTUR:
#   - n8n        → sudah existing di PT P79, tidak perlu di sini.
#   - Ollama     → remote server PT P79, akses via Bearer token.
#                  Set OLLAMA_ENDPOINT + JWT_TOKEN di .env.
#   - Neo4j      → Neo4j Aura (cloud), tidak perlu container lokal.
#                  Set NEO4J_URI + NEO4J_USERNAME + NEO4J_PASSWORD di .env.
#   - FastAPI    → untuk sekarang lokal; deploy target menyusul.
#
# Usage:
#   docker compose up -d          → jalankan FastAPI (Neo4j sudah di Aura cloud)
#   docker compose logs -f api    → lihat log FastAPI
# =============================================================

networks:
  virgo-net:
    driver: bridge


services:
  # ── FastAPI — Backend Recommendation Service ─────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virgo-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./ontology/ttl:/app/ontology/ttl
    networks:
      - virgo-net
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

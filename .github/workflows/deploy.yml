name: Build and Deploy to AWS ECS

# Trigger: setiap push ke branch main
on:
  push:
    branches:
      - main

env:
  AWS_REGION:      ap-southeast-1
  ECR_REGISTRY:    202077790155.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY:  virgo-recsys
  ECS_CLUSTER:     virgo-cluster
  ECS_SERVICE:     virgo-api
  CONTAINER_NAME:  virgo-api

jobs:
  deploy:
    name: Build → Push ECR → Deploy ECS
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Checkout source code ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup AWS credentials dari GitHub Secrets ────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 3. Login Docker ke ECR ───────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build & push image dengan 2 tag ──────────────────────
      #    - SHA tag  → unik per commit, bisa rollback ke versi tertentu
      #    - latest   → selalu menunjuk ke image terbaru
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # ── 5. Update image di task definition ──────────────────────
      #    Render task-definition.json dengan image SHA terbaru
      #    (file aslinya tidak diubah, hanya copy sementara di runner)
      - name: Render ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      # ── 6. Deploy rolling update ke ECS ─────────────────────────
      #    ECS akan pull image baru, jalankan container baru,
      #    baru matikan container lama (zero-downtime)
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
